<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxia de Amor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #0a0015;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white;
  height: 100vh;
  width: 100vw;
}

#nebula {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(255, 0, 100, 0.12), transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(100, 0, 255, 0.12), transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(0, 200, 255, 0.08), transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(255, 100, 0, 0.06), transparent 50%);
  z-index: 0;
}

#stars-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.shooting-stars { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }

.shooting-star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
  animation: shoot linear infinite;
}

@keyframes shoot {
  0% { transform: translate(0, 0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translate(-300px, 300px); opacity: 0; }
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3.5em;
  font-weight: 800;
  text-align: center;
  background: linear-gradient(135deg, #ff6bcb, #ff9a9e, #a18cd1, #fbc2eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 40px rgba(255, 107, 203, 0.4));
  animation: pulseGlow 4s ease-in-out infinite;
  z-index: 5;
  letter-spacing: 2px;
  line-height: 1.3;
}

.center-text small {
  display: block;
  font-size: 0.35em;
  font-weight: 300;
  -webkit-text-fill-color: rgba(255,255,255,0.6);
  background: none;
  filter: none;
  margin-top: 8px;
  letter-spacing: 4px;
}

@keyframes pulseGlow {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(255, 107, 203, 0.3)); transform: translate(-50%, -50%) scale(1); }
  50% { filter: drop-shadow(0 0 60px rgba(255, 107, 203, 0.7)); transform: translate(-50%, -50%) scale(1.03); }
}

.solar-system {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 600px;
  height: 600px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  z-index: 3;
}

.sun {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff7a0, #ffaa00);
  box-shadow: 0 0 60px 20px rgba(255, 200, 50, 0.3);
}

.orbit {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: spin linear infinite;
}

.orbit .planet {
  position: absolute;
  top: 50%;
  left: 100%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.floating-messages {
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  overflow: hidden;
}

.float-msg {
  position: absolute;
  font-size: 1.3em;
  color: rgba(255, 182, 249, 0.7);
  text-shadow: 0 0 20px rgba(255, 105, 180, 0.5), 0 0 40px rgba(255, 20, 147, 0.3);
  opacity: 0;
  animation: rise linear infinite;
  white-space: nowrap;
  z-index: 4;
}

@keyframes rise {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.8; }
  100% { transform: translateY(-10vh) rotate(10deg); opacity: 0; }
}

.heart-particle {
  position: fixed;
  pointer-events: none;
  z-index: 6;
  font-size: 20px;
  animation: heartFloat 4s ease-out forwards;
  opacity: 0;
}

@keyframes heartFloat {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
}

@media (max-width: 768px) {
  .center-text { font-size: 2em; }
  .solar-system { width: 350px; height: 350px; }
  .sun { width: 25px; height: 25px; }
}
</style>
</head>
<body>

<div id="nebula"></div>
<canvas id="stars-canvas"></canvas>

<div class="shooting-stars" id="shootingStars"></div>

<div class="center-text">
  Galaxia de Amor
  <small>Eres mi universo entero</small>
</div>

<div class="solar-system">
  <div class="sun"></div>
  <div class="orbit" style="width:120px; height:120px; animation-duration:8s;">
    <div class="planet" style="width:8px; height:8px; background:#ff6b6b; box-shadow: 0 0 12px #ff6b6b;"></div>
  </div>
  <div class="orbit" style="width:200px; height:200px; animation-duration:12s;">
    <div class="planet" style="width:12px; height:12px; background:#ffd93d; box-shadow: 0 0 14px #ffd93d;"></div>
  </div>
  <div class="orbit" style="width:290px; height:290px; animation-duration:18s;">
    <div class="planet" style="width:10px; height:10px; background:#6bcbff; box-shadow: 0 0 12px #6bcbff;"></div>
  </div>
  <div class="orbit" style="width:390px; height:390px; animation-duration:25s;">
    <div class="planet" style="width:16px; height:16px; background:#c084fc; box-shadow: 0 0 18px #c084fc;"></div>
  </div>
  <div class="orbit" style="width:500px; height:500px; animation-duration:35s;">
    <div class="planet" style="width:14px; height:14px; background:#34d399; box-shadow: 0 0 14px #34d399;"></div>
  </div>
</div>

<div class="floating-messages" id="messagesContainer"></div>

<script>
const messages = [
  "Te amo", "Eres mi todo", "Mi estrella favorita",
  "Eres mi universo", "Siempre juntos", "Mi luz",
  "Eres magia", "Para siempre", "Mi corazón es tuyo",
  "Eres única", "Te adoro", "Mi amor eterno",
  "Eres mi razón", "Contigo todo es mejor"
];

const hearts = ["❤", "💕", "💗", "💖", "💝", "✨", "🌟"];

// Stars
(function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 500; i++) {
    stars.push({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 2 + 0.5,
      alpha: Math.random(), speed: 0.005 + Math.random() * 0.02,
      dir: Math.random() > 0.5 ? 1 : -1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      s.alpha += s.speed * s.dir;
      if (s.alpha > 1 || s.alpha < 0.1) s.dir *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// Shooting stars
(function initShootingStars() {
  const container = document.getElementById('shootingStars');
  function create() {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 40 + '%';
    star.style.animationDuration = (1 + Math.random()) + 's';
    star.style.animationDelay = '0s';
    container.appendChild(star);
    setTimeout(() => star.remove(), 3000);
  }
  setInterval(create, 3000 + Math.random() * 4000);
})();

// Floating messages
(function initMessages() {
  const container = document.getElementById('messagesContainer');
  function createMsg() {
    const msg = document.createElement('div');
    msg.className = 'float-msg';
    msg.textContent = messages[Math.floor(Math.random() * messages.length)];
    msg.style.left = (Math.random() * 80 + 10) + '%';
    msg.style.fontSize = (1 + Math.random() * 0.8) + 'em';
    msg.style.animationDuration = (10 + Math.random() * 8) + 's';
    msg.style.animationDelay = '0s';
    container.appendChild(msg);
    setTimeout(() => msg.remove(), 20000);
  }
  for (let i = 0; i < 3; i++) setTimeout(createMsg, i * 3000);
  setInterval(createMsg, 2500);
})();

// Hearts on click
document.addEventListener('click', function(e) {
  for (let i = 0; i < 5; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart-particle';
    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = (e.clientX + (Math.random() - 0.5) * 60) + 'px';
    heart.style.top = e.clientY + 'px';
    heart.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }
});
</script>
</body>
</html>
